<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Page</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
        crossorigin="anonymous">
        <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Hanifi+Rohingya:wght@400..700&family=Noto+Sans+Pahawh+Hmong&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="profile-page py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-md-10 col-lg-8">
                    <section class="card profile-card border-0 shadow-lg">
                        <div class="card-body p-4 p-md-5">
                            <div class="text-center">
                                <img src="./logo_1.png" alt="Profile Image" class="profile-img shadow-sm mb-4">
                                <span class="role-pill mb-3 d-inline-block">Frontend Developer</span>
                                <h1 class="display-6 fw-bold mb-2">Omkar Manoj Kulkarni</h1>
                                <p class="lead text-secondary mb-0">Building my frontend skills one step at a time.</p>
                            </div>

                            <div class="row g-4 mt-2">
                                <div class="col-md-6">
                                    <div class="info-block h-100">
                                        <h2 class="section-title">About Me</h2>
                                        <p class="mb-0">
                                            I am a quick learner and now I am learning HTML while growing my frontend development skills.
                                        </p>
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <div class="info-block h-100">
                                        <h2 class="section-title">Skills</h2>
                                        <div class="d-flex flex-wrap gap-2">
                                            <span class="skill-badge">HTML</span>
                                            <span class="skill-badge">CSS</span>
                                            <span class="skill-badge">JavaScript</span>
                                            <span class="skill-badge">Vue.js</span>
                                            <span class="skill-badge">Git</span>
                                            <span class="skill-badge">API Integration</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>
                </div>
            </div>
        </div>
    </main>

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
