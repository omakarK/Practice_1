<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>

  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Sidebar Created by Ajay Sonwane -->
  <div class="sidebar p-3">
    <h5 class="mb-4"><i class="fas fa-home"></i> My Dashboard</h5>

    <a href="#" class="active" ><i class="fas fa-chart-line me-2"></i>Dashboard</a>
    <a href="#" onclick="sidebarbtn()"><i class="fas fa-users me-2" ></i>Users</a>
    <a href="#" onclick="sidebarbtn()"><i class="fas fa-file-alt me-2"></i>Reports</a>
    <a href="#" onclick="sidebarbtn()"><i class="fas fa-cog me-2"></i>Settings</a>
    <a href="#" onclick="sidebarbtn()"><i class="fas fa-sign-out-alt me-2"></i>Logout</a>
  </div>

  <!-- Main Content Created By Nikhilesh Raut -->
  <div class="main">

    <!-- Header -->
    <div class="topbar d-flex justify-content-between align-items-center">
      <h5 class="mb-0">Dashboard</h5>
      <div>Welcome, Admin 👤</div>
    </div>

    <div class="container-fluid p-4">

      <!-- Cards Created By Shyam Rathi-->
      <div class="row g-4 mb-4">
        <div class="col-md-4">
          <div class="card p-3">
            <small>Total User</small>
            <h4>1200</h4>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card p-3">
            <small>Revenue</small>
            <h4>₹50,000</h4>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card p-3">
            <small>Orders</small>
            <h4>320</h4>
          </div>
        </div>
      </div>

      <!-- Form Created by Omkar Kulkarni -->
      <div class="card p-4">
        <h5 class="mb-3">User Form</h5>

        <form onsubmit="return showMessage()">
  <div class="mb-3">
    <label class="form-label">Full Name</label>
    <input type="text" class="form-control" required placeholder="Enter FullName" id="fullname">
  </div>

  <div class="mb-3">
    <label class="form-label">Email</label>
    <input type="email" class="form-control" required placeholder="Enter email">
  </div>

  <div class="mb-3">
    <label class="form-label">Select Skills</label><br>
    <input type="checkbox"> HTML
    <input type="checkbox" class="ms-3"> CSS
    <input type="checkbox" class="ms-3"> JavaScript
  </div>

  <div class="mb-3">
    <label class="form-label">Select Gender</label><br>
    <input type="radio" name="gender"> Male
    <input type="radio" name="gender" class="ms-3"> Female
    <input type="radio" name="gender" class="ms-3"> Other
  </div>

  <button type="submit" class="btn btn-primary">Submit</button>
</form>
      </div>

    </div>
  </div>

    <script>
function showMessage() {
    let name = document.getElementById("fullname").value;

    if (name.trim() === "") {
        alert("Please enter your full name ");
        return false; 
    } else {
        alert("Form Submitted Successfully ");
        return true;   
    }
}

function sidebarbtn(){
    alert('functionality Not added till Yet');
}
</script>
</body>
</html>
